<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Chat Application</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            background: #1e293b;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            flex-shrink: 0;
        }

        header h1 { font-size: 22px; }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ef4444;
            display: inline-block;
            margin-right: 8px;
            transition: background 0.3s;
        }
        .status-dot.connected { background: #22c55e; }

        #statusText { font-size: 13px; color: #94a3b8; }

        /* ── LAYOUT ── */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 200px;
            background: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            padding: 16px 16px 8px;
        }

        .room-list { flex: 1; overflow-y: auto; }

        .room-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #94a3b8;
            border-left: 3px solid transparent;
            transition: all 0.15s;
        }
        .room-item:hover { background: #273548; color: #f8fafc; }
        .room-item.active {
            background: #1d3a5f;
            color: #38bdf8;
            border-left-color: #38bdf8;
            font-weight: bold;
        }
        .room-item .badge {
            float: right;
            background: #38bdf8;
            color: #0f172a;
            border-radius: 10px;
            font-size: 11px;
            padding: 1px 6px;
            font-weight: bold;
        }

        /* ── LOGIN OVERLAY ── */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .login-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 36px;
            width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .login-card h2 { margin-bottom: 24px; font-size: 22px; }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }

        input, select {
            width: 100%;
            padding: 10px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: #38bdf8; }

        .btn {
            width: 100%;
            padding: 11px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #7dd3fc; }

        /* ── CHAT AREA ── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 14px 20px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            font-size: 15px;
            color: #94a3b8;
            flex-shrink: 0;
        }

        .chat-header span { color: #38bdf8; font-weight: bold; }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.them {
            background: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.me {
            background: #1d3a5f;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid #38bdf8;
        }

        .message .meta {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .message.me .meta { text-align: right; color: #7dd3fc; }

        .message .text { color: #f1f5f9; }

        /* system messages */
        .message.system {
            background: transparent;
            align-self: center;
            color: #64748b;
            font-size: 12px;
            font-style: italic;
            padding: 4px 0;
        }

        /* ── INPUT BAR ── */
        .input-bar {
            padding: 16px 20px;
            background: #1e293b;
            border-top: 1px solid #334155;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        #msgInput {
            flex: 1;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 14px;
            outline: none;
        }
        #msgInput:focus { border-color: #38bdf8; }

        .send-btn {
            padding: 10px 20px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .send-btn:hover { background: #7dd3fc; }
        .send-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        /* scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body>

<!-- ── LOGIN OVERLAY ── -->
<div id="loginOverlay">
    <div class="login-card">
        <h2>Join Chat</h2>
        <div class="field">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="e.g. Tia" maxlength="30" />
        </div>
        <div class="field">
            <label>Room</label>
            <select id="loginRoom">
                <option value="general">general</option>
                <option value="sports">sports</option>
                <option value="lobby">lobby</option>
            </select>
        </div>
        <button class="btn" onclick="joinChat()">Join Room</button>
    </div>
</div>

<!-- ── MAIN LAYOUT ── -->
<header>
    <h1>Chat Application</h1>
    <div>
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
    </div>
</header>

<div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Rooms</h2>
        <div class="room-list">
            <div class="room-item active" data-room="general" onclick="switchRoom('general')"># general</div>
            <div class="room-item" data-room="sports" onclick="switchRoom('sports')"># sports</div>
            <div class="room-item" data-room="lobby" onclick="switchRoom('lobby')"># lobby</div>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
        <div class="chat-header">
            Room: <span id="currentRoomLabel">general</span>
            &nbsp;·&nbsp; Logged in as <span id="currentUserLabel">-</span>
        </div>
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="msgInput" placeholder="Type a message..." disabled
                   onkeydown="if(event.key==='Enter') sendMessage()" />
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
<script>
    let username = "";
    let currentRoom = "general";
    // Store messages per room so switching rooms shows correct history
    const roomMessages = { general: [], sports: [], lobby: [] };
    const unreadCounts = { general: 0, sports: 0, lobby: 0 };

    const connection = new signalR.HubConnectionBuilder()
        .withUrl("/chathub")
        .withAutomaticReconnect()
        .build();

    // ── RECEIVE MESSAGE FROM SERVER ──
    connection.on("ReceiveMessage", function (msg) {
        const isCurrentRoom = msg.room === currentRoom;

        // Store in room history
        if (roomMessages[msg.room] !== undefined) {
            roomMessages[msg.room].push(msg);
        }

        if (isCurrentRoom) {
            appendMessage(msg);
        } else {
            // Increment unread badge for other rooms
            unreadCounts[msg.room] = (unreadCounts[msg.room] || 0) + 1;
            updateBadge(msg.room);
        }
    });

    connection.onreconnecting(() => setStatus(false, "Reconnecting..."));
    connection.onreconnected(() => setStatus(true, "Connected"));
    connection.onclose(() => setStatus(false, "Disconnected"));

    // ── JOIN CHAT ──
    function joinChat() {
        const u = document.getElementById("loginUsername").value.trim();
        const r = document.getElementById("loginRoom").value;
        if (!u) { alert("Please enter a username."); return; }

        username = u;
        currentRoom = r;

        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("currentUserLabel").textContent = username;
        document.getElementById("currentRoomLabel").textContent = currentRoom;
        setActiveRoom(currentRoom);

        document.getElementById("msgInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("msgInput").focus();

        // Connect to SignalR hub
        connection.start()
            .then(() => {
                setStatus(true, "Connected");
                appendSystem(`You joined #${currentRoom} as ${username}`);
            })
            .catch(err => {
                setStatus(false, "Connection failed");
                console.error(err);
            });
    }

    // ── SWITCH ROOM (sidebar) ──
    function switchRoom(room) {
        if (room === currentRoom) return;
        currentRoom = room;
        setActiveRoom(room);

        document.getElementById("currentRoomLabel").textContent = room;

        // Clear messages and replay stored history for this room
        document.getElementById("messages").innerHTML = "";
        (roomMessages[room] || []).forEach(appendMessage);
        appendSystem(`Switched to #${room}`);

        // Clear unread badge
        unreadCounts[room] = 0;
        updateBadge(room);
    }

    // ── SEND MESSAGE ──
    // Note: the GUI does not publish directly to RabbitMQ.
    // Users must run the ChatApp CLI to send messages.
    // The GUI is a read-only live view. This button is kept
    // for future extension where the GUI publishes via the backend.
    function sendMessage() {
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (!text || !username) return;

        // Optimistic local echo — the CLI is the canonical publisher
        const msg = {
            username: username,
            room: currentRoom,
            content: text,
            sentAt: new Date().toISOString()
        };
        appendMessage(msg, true);
        input.value = "";
        input.focus();
    }

    // ── RENDER ──
    function appendMessage(msg, isSelf) {
        const isMe = isSelf || msg.username === username;
        const div = document.createElement("div");
        div.className = `message ${isMe ? "me" : "them"}`;

        const time = new Date(msg.sentAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        div.innerHTML = `
            <div class="meta">${isMe ? "You" : msg.username} · ${time}</div>
            <div class="text">${escapeHtml(msg.content)}</div>
        `;

        const container = document.getElementById("messages");
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function appendSystem(text) {
        const div = document.createElement("div");
        div.className = "message system";
        div.textContent = text;
        const container = document.getElementById("messages");
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function setStatus(connected, text) {
        document.getElementById("statusDot").className = `status-dot${connected ? " connected" : ""}`;
        document.getElementById("statusText").textContent = text;
    }

    function setActiveRoom(room) {
        document.querySelectorAll(".room-item").forEach(el => {
            el.classList.toggle("active", el.dataset.room === room);
        });
    }

    function updateBadge(room) {
        const el = document.querySelector(`.room-item[data-room="${room}"]`);
        if (!el) return;
        const count = unreadCounts[room] || 0;
        const existing = el.querySelector(".badge");
        if (count > 0) {
            if (existing) existing.textContent = count;
            else {
                const badge = document.createElement("span");
                badge.className = "badge";
                badge.textContent = count;
                el.appendChild(badge);
            }
        } else if (existing) {
            existing.remove();
        }
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }
</script>
</body>
</html>
