services:

  # ── SHARED INFRASTRUCTURE ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: sqlserver
    environment:
      SA_PASSWORD: "YourPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  # ── TASK 1: CHAT CLI ──────────────────────────────────────────────
  # Note: ChatApp is a CLI (interactive terminal app).
  # It is not started automatically by compose — run it manually:
  #   docker compose run --rm chatapp Tia rabbitmq general
  chatapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatapp
    stdin_open: true
    tty: true
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=ChatApp;User Id=sa;Password=YourPassword123!;
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started

  # ── TASK 1: CHAT GUI ──────────────────────────────────────────────
  chatgui:
    build:
      context: ./ChatGUI
      dockerfile: Dockerfile
    container_name: chatgui
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitdata:
  sqldata:
